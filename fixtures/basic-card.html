<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>html2fig fixture - basic card</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f6fb;
      color: #16324f;
    }
    #app {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      box-sizing: border-box;
    }
    .card {
      width: 420px;
      background: #ffffff;
      border: 1px solid #d9e2ec;
      border-radius: 16px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
      padding: 24px;
      box-sizing: border-box;
    }
    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #486581;
      margin-bottom: 10px;
    }
    h1 {
      font-size: 28px;
      line-height: 1.2;
      margin: 0 0 12px;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      margin: 0 0 18px;
      color: #334e68;
    }
    .cta {
      display: inline-block;
      padding: 12px 16px;
      background: #0f62fe;
      color: #ffffff;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <section class="card" aria-label="Basic Card">
      <div class="eyebrow">Fixture</div>
      <h1>Simple Card Layout</h1>
      <p>This page is used to validate a basic frame + text capture flow.</p>
      <a class="cta" href="#">Primary Action</a>
    </section>
  </div>
</body>
</html>
