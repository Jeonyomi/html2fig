<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>html2fig fixture - wrapped text</title>
  <style>
    body {
      margin: 0;
      background: #ffffff;
      font-family: Arial, sans-serif;
      color: #102a43;
    }
    #capture-root {
      width: 360px;
      margin: 60px auto;
      padding: 24px;
      border: 1px solid #bcccdc;
      border-radius: 12px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      box-sizing: border-box;
    }
    .title {
      font-size: 24px;
      line-height: 1.25;
      margin: 0 0 16px;
    }
    .copy {
      font-size: 16px;
      line-height: 1.7;
      color: #334e68;
      max-width: 280px;
    }
  </style>
</head>
<body>
  <div id="capture-root">
    <h1 class="title">Wrapped Text Fixture</h1>
    <div class="copy">This fixture intentionally uses a narrow text column so wrapped text generates multiple client rects in the capture output.</div>
  </div>
</body>
</html>
