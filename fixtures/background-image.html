<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>html2fig fixture - background image</title>
  <style>
    body {
      margin: 0;
      background: #eaf1f7;
      font-family: Arial, sans-serif;
      color: #102a43;
    }
    #fixture-bg {
      width: 520px;
      height: 280px;
      margin: 60px auto;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      background-image: url('https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1200&q=80');
      background-size: cover;
      background-position: center;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.14);
    }
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.18) 0%, rgba(15, 23, 42, 0.65) 100%);
      display: flex;
      align-items: end;
      padding: 24px;
      box-sizing: border-box;
    }
    .label {
      color: #ffffff;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
    }
  </style>
</head>
<body>
  <div id="fixture-bg">
    <div class="overlay">
      <div class="label">Background Image Fixture</div>
    </div>
  </div>
</body>
</html>
