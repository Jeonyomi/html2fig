<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>html2fig capture</title>
  <style>
    body {
      margin: 0;
      padding: 16px;
      width: 340px;
      font-family: Inter, system-ui, sans-serif;
      background: #f7fafc;
      color: #102a43;
      box-sizing: border-box;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 8px;
    }
    p {
      font-size: 12px;
      line-height: 1.5;
      margin: 0 0 12px;
      color: #486581;
    }
    label {
      display:block;
      font-size:12px;
      font-weight:600;
      margin-bottom:6px;
    }
    .row {
      display: flex;
      gap: 8px;
    }
    button {
      flex: 1;
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .primary { background: #0f62fe; color: white; }
    .secondary { background: #d9e2ec; color: #102a43; }
    .status {
      margin-top: 12px;
      min-height: 48px;
      padding: 10px;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      background: #ffffff;
      font-size: 12px;
      color: #102a43;
      white-space: pre-line;
      overflow-wrap: anywhere;
    }
    .matrix {
      margin-top: 12px;
      padding: 10px;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      background: #fff;
    }
    .matrix-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #486581;
      margin-bottom: 8px;
    }
    .matrix-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 6px;
      align-items: center;
      margin-top: 6px;
    }
    .matrix-row:first-of-type { margin-top: 0; }
    .matrix-label {
      font-size: 11px;
      color: #102a43;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .mini {
      flex: 0 0 auto;
      padding: 6px 8px;
      font-size: 11px;
      border-radius: 6px;
    }
    .mini.primary {
      background: #0f62fe;
      color: #fff;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .notes-box {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      background: #f8fbff;
    }
    .notes-box label {
      margin-bottom: 4px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #486581;
    }
    .notes-box textarea {
      width: 100%;
      min-height: 58px;
      resize: vertical;
      border: 1px solid #cbd2d9;
      border-radius: 8px;
      padding: 8px 10px;
      box-sizing: border-box;
      font: inherit;
      font-size: 12px;
      background: #fff;
      color: #102a43;
    }
  </style>
</head>
<body>
  <h1>html2fig capture</h1>
  <p>Capture the current page and copy the default Figma native-paste test payload.</p>
  <div class="row">
    <button class="primary" id="captureBtn">Prepare Figma Test Payload</button>
  </div>
  <button class="primary" id="nativeSceneBtn" type="button" style="margin-top:12px;width:100%;display:none;">⭐ Copy Native Scene (kiwi)</button>
  <button class="primary" id="bestProbeBtn" type="button" style="margin-top:8px;width:100%;display:none;">Copy Figma Test Payload (probe)</button>
  <div class="row" style="margin-top:8px;">
    <button class="secondary" id="kiwiTestBtn" type="button">Test Kiwi Round-trip</button>
    <button class="secondary" id="schemaRectBtn" type="button">Schema Rect Spike</button>
  </div>
  <div class="matrix" id="variantMatrix" hidden>
    <div class="matrix-title">Native paste probe</div>
    <div class="toolbar">
      <button class="secondary mini" id="exportMatrixBtn" type="button">Export Notes</button>
    </div>
    <div class="notes-box">
      <label for="variantNotes">Test result</label>
      <textarea id="variantNotes" placeholder="What happened after paste in Figma?"></textarea>
    </div>
    <div id="variantRows"></div>
  </div>
  <div class="status" id="status">[popup] waiting</div>
  <script type="module" src="popup.js"></script>
</body>
</html>
