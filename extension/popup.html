<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>html2fig capture</title>
  <style>
    body {
      margin: 0;
      padding: 16px;
      width: 320px;
      font-family: Inter, system-ui, sans-serif;
      background: #f7fafc;
      color: #102a43;
      box-sizing: border-box;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 8px;
    }
    p {
      font-size: 12px;
      line-height: 1.5;
      margin: 0 0 12px;
      color: #486581;
    }
    .row {
      display: flex;
      gap: 8px;
    }
    button {
      flex: 1;
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .primary { background: #0f62fe; color: white; }
    .secondary { background: #d9e2ec; color: #102a43; }
    .status {
      margin-top: 12px;
      min-height: 18px;
      font-size: 12px;
      color: #486581;
    }
  </style>
</head>
<body>
  <h1>html2fig capture</h1>
  <p>Capture the current page and copy html2fig JSON to the clipboard for Figma import.</p>
  <div class="row">
    <button class="primary" id="captureBtn">Copy to Clipboard</button>
    <button class="secondary" id="captureAppBtn">Copy #app</button>
  </div>
  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
