<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>html2fig capture</title>
  <style>
    body {
      margin: 0;
      padding: 16px;
      width: 340px;
      font-family: Inter, system-ui, sans-serif;
      background: #f7fafc;
      color: #102a43;
      box-sizing: border-box;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 8px;
    }
    p {
      font-size: 12px;
      line-height: 1.5;
      margin: 0 0 12px;
      color: #486581;
    }
    label {
      display:block;
      font-size:12px;
      font-weight:600;
      margin-bottom:6px;
    }
    select {
      width:100%;
      padding:8px 10px;
      border-radius:8px;
      border:1px solid #cbd2d9;
      margin-bottom:12px;
      font-size:12px;
      background:#fff;
    }
    .row {
      display: flex;
      gap: 8px;
    }
    button {
      flex: 1;
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .primary { background: #0f62fe; color: white; }
    .secondary { background: #d9e2ec; color: #102a43; }
    .status {
      margin-top: 12px;
      min-height: 18px;
      font-size: 12px;
      color: #486581;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <h1>html2fig capture</h1>
  <p>Capture the current page and copy a test payload to the clipboard for Figma paste experiments.</p>
  <label for="mode">Clipboard payload mode</label>
  <select id="mode">
    <option value="json">JSON (text/plain)</option>
    <option value="html">HTML wrapper (text/html)</option>
    <option value="svg">SVG snapshot (text/plain + text/html)</option>
    <option value="rich">Experimental rich clipboard</option>
    <option value="figma-html">Figma wrapper HTML probe</option>
    <option value="figma-html-rich">Figma wrapper rich multi-mime probe</option>
  </select>
  <div class="row">
    <button class="primary" id="captureBtn">Copy Current Page</button>
    <button class="secondary" id="captureAppBtn">Copy #app</button>
  </div>
  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
